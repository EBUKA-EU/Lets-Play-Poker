<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vue 3 Poker Hand</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <h1 class="text-center mt-4 game-title">Let's Play Poker</h1>

    <div id="app" class="container text-center mt-5">
        <div class="mb-4 text-center">
            <button class="btn btn-outline-light me-2" :class="{ 'btn-warning': gameMode === 'basic' }"
                @click="switchMode('basic')">
                Basic
            </button>

            <button class="btn btn-outline-light" :class="{ 'btn-warning': gameMode === 'texas' }"
                @click="switchMode('texas')">
                Texas Hold'em
            </button>
        </div>

        <!-- Basic Poker -->
        <div v-if="gameMode === 'basic'">
            <div class="row justify-content-center">
                <div class="col-lg-10 col-xl-8 table-felt">
                    <h2 class="mb-4 game-title">Draw Poker Hand</h2>
                    <button class="btn btn-warning poker-btn mb-4" @click="drawNewHand">
                        {{ buttonText }}
                    </button>
                    <div v-if="hand && hand.length" class="row justify-content-center mb-3">
                        <div v-for="(card, index) in hand" :key="card.code"
                            class="col-6 col-sm-4 col-md-2 card-slot mb-3">
                            <img :src="card.selected
                                ? 'https://deckofcardsapi.com/static/img/back.png'
                                : card.image" :alt="card.value + ' of ' + card.suit" class="img-fluid rounded shadow"
                                :class="{ 'card-selected': card.selected }" @click="toggleCard(index)">
                        </div>
                    </div>
                    <div v-if="handResult" class="alert alert-success text-center fw-bold fs-5 mt-3 shadow-sm">
                        Best Hand: {{ handResult }}
                    </div>
                    <p v-if="loading" class="text-warning fs-5">Loading...</p>
                    <p v-else-if="error" class="text-danger fs-5">{{ error }}</p>
                    <p v-else class="hand-label">{{ instructionText }}</p>
                    <p class="footer-text mt-3">
                        Current Deck ID: {{ deckId }}
                    </p>
                </div>
            </div>
        </div>

        <!-- Texas Hold'em -->
        <div v-if="gameMode === 'texas'">
            <div class="row justify-content-center">
                <div class="col-lg-10 col-xl-8 table-felt">

                    <h2 class="mb-4 game-title">Texas Hold'em</h2>

                    <button class="btn btn-warning poker-btn mb-4" @click="texasAction">
                        {{ texasButtonText }}
                    </button>

                    <p class="hand-label">{{ texasInstruction }}</p>

                    <!-- Hole Cards -->
                    <div v-if="texasHole.length" class="mb-4">
                        <div class="row justify-content-center">
                            <div v-for="card in texasHole" :key="card.code" class="col-6 col-sm-2 texas-card mb-3">
                                <img :src="card.image" class="img-fluid rounded shadow">
                            </div>
                        </div>
                    </div>

                    <!-- Community Cards -->
                    <div v-if="phase !== 'idle'">
                        <h5 class="mt-3 game-title">Community Cards</h5>
                        <div class="row justify-content-center mt-3">
                            <div v-for="card in texasCommunity" :key="card.code" class="col-4 col-sm-2 texas-card mb-3">
                                <img :src="card.image" class="img-fluid rounded shadow">
                            </div>
                        </div>
                    </div>

                    <!-- Best Hand -->
                    <div v-if="phase !== 'idle'" class="alert alert-success mt-4 fw-bold fs-5 shadow-sm">
                        Best Hand: {{ texasBestHand }}
                    </div>

                </div>
            </div>
        </div>

    </div>


    <script type="module" src="main.js"></script>
</body>

</html>
